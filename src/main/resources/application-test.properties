# Test profile.

# H2 DataSource
spring.datasource.url=jdbc:h2:mem:lms_vera_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Flyway
spring.flyway.placeholders.generatedStored=/* H2 generated column */

# SePay Test Configuration
app.sepay.webhook-secret=test-sepay-secret
app.sepay.bank-account=123456789
app.sepay.bank-code=Vietcombank

# Bunny Stream Test Configuration
app.bunny.stream.library-id=mock-library
