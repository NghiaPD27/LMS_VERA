# Production profile for VPS deployment.

# PostgreSQL DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.placeholders.generatedStored=STORED

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# OpenAPI / Swagger
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true

# SePay
app.sepay.webhook-secret=${SEPAY_WEBHOOK_SECRET}
app.sepay.bank-account=${SEPAY_BANK_ACCOUNT}
app.sepay.bank-code=${SEPAY_BANK_CODE}
app.sepay.payment-code-prefix=${SEPAY_PAYMENT_CODE_PREFIX:LMSP}
app.sepay.qr-base-url=${SEPAY_QR_BASE_URL:https://vietqr.app/img}

# Bunny Stream
app.bunny.stream.client=${BUNNY_STREAM_CLIENT:real}
app.bunny.stream.api-key=${BUNNY_STREAM_API_KEY}
app.bunny.stream.library-id=${BUNNY_STREAM_LIBRARY_ID}
app.bunny.stream.playback-base-url=${BUNNY_STREAM_PLAYBACK_BASE_URL}
