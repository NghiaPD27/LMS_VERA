name: Blue-Green Deployment Pipeline

on:
  push:
    branches: ["main"]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/lms-vera-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/lms-vera-backend:${{ github.sha }}

  deploy-to-vps:
    name: Deploy to VPS (Zero-Downtime)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Generate .env file from Single Secret
        env:
          ENV_CONTENT: ${{ secrets.ENV }}
        run: |
          mkdir -p deploy
          printf '%s\n' "$ENV_CONTENT" > deploy/.env
          chmod 600 deploy/.env

      - name: Copy Deploy Scripts and .env via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy"
          target: "/root/lms-vera-backend"

      - name: Execute Blue-Green Deploy Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/lms-vera-backend
            chmod 600 deploy/.env
            chmod +x deploy/deploy.sh
            bash deploy/deploy.sh "${{ secrets.DOCKER_USERNAME }}/lms-vera-backend:latest"
